<nav class="navbar">
  <a href="{{ '/' | relative_url }}" class="nav-logo">
    <img src="{{ '/assets/images/logo.png' | relative_url }}" alt="相信幸福博覽會">
    <span>相信幸福博覽會</span>
  </a>

  <!-- 漢堡按鈕（行動裝置） -->
  <button class="hamburger" id="hamburger" aria-label="開啟選單" aria-expanded="false">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <ul class="nav-links" id="nav-links">
    <li><a href="{{ '/' | relative_url }}">首頁</a></li>
    <li><a href="{{ '/pages/emotion-expo' | relative_url }}">情緒教育展</a></li>
    <li><a href="{{ '/pages/happiness-fair' | relative_url }}">幸福園遊會</a></li>
    <li><a href="{{ '/pages/dance-contest' | relative_url }}">反毒街舞賽</a></li>
    <li><a href="{{ '/pages/sponsors' | relative_url }}">贊助單位</a></li>
  </ul>
</nav>

<script>
  const hamburger = document.getElementById('hamburger');
  const navLinks = document.getElementById('nav-links');

  hamburger.addEventListener('click', () => {
    const isOpen = navLinks.classList.toggle('open');
    hamburger.classList.toggle('open', isOpen);
    hamburger.setAttribute('aria-expanded', isOpen);
  });

  // 點連結後自動關閉選單
  navLinks.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', () => {
      navLinks.classList.remove('open');
      hamburger.classList.remove('open');
      hamburger.setAttribute('aria-expanded', false);
    });
  });
</script>
