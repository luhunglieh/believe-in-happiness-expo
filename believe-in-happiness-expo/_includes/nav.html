<nav class="navbar">
  <a href="{{ '/' | relative_url }}" class="nav-logo">
    <img src="{{ '/assets/images/logo.png' | relative_url }}" alt="相信幸福博覽會">
    <span>相信幸福博覽會</span>
  </a>

  <!-- 漢堡按鈕（行動裝置） -->
  <button class="hamburger" id="hamburger" aria-label="開啟選單" aria-expanded="false">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <ul class="nav-links" id="nav-links">
    {% for link in site.navigation %}
    <li><a href="{{ link.url | relative_url }}">{{ link.title }}</a></li>
    {% endfor %}
  </ul>
</nav>

<script>
  const hamburger = document.getElementById('hamburger');
  const navLinks = document.getElementById('nav-links');

  hamburger.addEventListener('click', () => {
    const isOpen = navLinks.classList.toggle('open');
    hamburger.classList.toggle('open', isOpen);
    hamburger.setAttribute('aria-expanded', isOpen);
  });

  // 點連結後自動關閉選單
  navLinks.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', () => {
      navLinks.classList.remove('open');
      hamburger.classList.remove('open');
      hamburger.setAttribute('aria-expanded', false);
    });
  });
</script>
