<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="國際扶輪3522地區 25-26年度服務計畫">
  
  <!-- Open Graph（LINE/FB 分享預覽） -->
  <meta property="og:title" content="反毒街舞賽">
  <meta property="og:description" content="國際扶輪3522地區 25-26年度服務計畫">
  <meta property="og:image" content="http://localhost:4000/assets/images/hero-banner.jpg">

  <link rel="stylesheet" href="/believe-in-happiness-expo/assets/css/style.css">
</head>
<body>

  <nav class="navbar">
  <a href="/believe-in-happiness-expo/" class="nav-logo">
    <img src="/believe-in-happiness-expo/assets/images/logo.png" alt="相信幸福博覽會">
    <span>相信幸福博覽會</span>
  </a>

  <!-- 漢堡按鈕（行動裝置） -->
  <button class="hamburger" id="hamburger" aria-label="開啟選單" aria-expanded="false">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <ul class="nav-links" id="nav-links">
    <li><a href="/believe-in-happiness-expo/">首頁</a></li>
    <li><a href="/believe-in-happiness-expo/pages/emotion-expo">情緒教育展</a></li>
    <li><a href="/believe-in-happiness-expo/pages/happiness-fair">幸福園遊會</a></li>
    <li><a href="/believe-in-happiness-expo/pages/dance-contest">反毒街舞賽</a></li>
    <li><a href="/believe-in-happiness-expo/pages/sponsors">贊助單位</a></li>
  </ul>
</nav>

<script>
  const hamburger = document.getElementById('hamburger');
  const navLinks = document.getElementById('nav-links');

  hamburger.addEventListener('click', () => {
    const isOpen = navLinks.classList.toggle('open');
    hamburger.classList.toggle('open', isOpen);
    hamburger.setAttribute('aria-expanded', isOpen);
  });

  // 點連結後自動關閉選單
  navLinks.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', () => {
      navLinks.classList.remove('open');
      hamburger.classList.remove('open');
      hamburger.setAttribute('aria-expanded', false);
    });
  });
</script>

  <main>
    <section class="page-hero" style="background: linear-gradient(135deg, #1a1a2e, #16213e);">
  <h1>💃 反毒街舞賽</h1>
  <p>共同努力，積極推動，共同維護國人包括青少年健康</p>
</section>

<div class="page-content">

  <!-- 成果統計 -->
  <div class="content-section">
    <h2>📊 反毒第四年成績斐然</h2>
    <div class="stats-row">
      <div class="stat-item">
        <span class="stat-num">1,000+</span>
        <span class="stat-label">累計青少年參與</span>
      </div>
      <div class="stat-item">
        <span class="stat-num">150</span>
        <span class="stat-label">間學校參賽</span>
      </div>
      <div class="stat-item">
        <span class="stat-num">100</span>
        <span class="stat-label">近百支隊伍參賽</span>
      </div>
      <div class="stat-item">
        <span class="stat-num">30萬+</span>
        <span class="stat-label">社群觀看數</span>
      </div>
    </div>
    <p style="text-align:center; margin-top:12px;">多位參賽者持續參與、成為反毒大使，共同努力，積極推動，共同維護國人包括青少年健康。</p>
  </div>

</div>
  </main>

  <footer class="site-footer">
  <img src="/believe-in-happiness-expo/assets/images/footer-logo.png" alt="相信幸福博覽會 Logo" class="footer-logo">
